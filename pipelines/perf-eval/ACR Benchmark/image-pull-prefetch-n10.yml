trigger: none

# n10 smoke test — same parameterized flow as image-pull-prefetch.yml but only
# 10 client nodes. Use this to validate the flow (auth, registry reachability,
# metrics) cheaply before committing to a 1000-node run.
parameters:
  - name: region
    displayName: Azure region
    type: string
    default: centralus
  - name: registryEndpoint
    displayName: "Registry login server (e.g. myreg.azurecr-test.io)"
    type: string
  - name: testImage
    displayName: "Image to pull (repo:tag)"
    type: string
    default: test-1gb-100l:v1
  - name: anonymousPull
    displayName: Anonymous pull
    type: boolean
    default: true
  - name: podStartupLatencyThreshold
    displayName: Pod startup latency threshold (large cold pulls need a high value)
    type: string
    default: 780s

pool:
  name: 'AKS-Telescope-Airlock'

variables:
  SCENARIO_TYPE: perf-eval
  # Reuses the committed 10-node scenario infra (terraform + tfvars).
  SCENARIO_NAME: image-pull-n10

stages:
  - stage: azure_${{ parameters.region }}_image_pull
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - ${{ parameters.region }}
          engine: clusterloader2
          engine_input:
            image: "ghcr.io/azure/clusterloader2:v20250513"
          topology: image-pull
          matrix:
            image-pull-10nodes:
              desired_nodes: 14
              node_count: 10
              max_pods: 26
              repeats: 1              # one pull per node — the cold-start test
              operation_timeout: 30m
              load_type: memory
              scrape_containerd: True
              scrape_kubelets: True
              scrape_registry: True
              containerd_scrape_interval: 15s
              registry_endpoint: ${{ parameters.registryEndpoint }}
              test_image: ${{ parameters.testImage }}
              kubernetes_version: "1.34"
              pod_startup_latency_threshold: ${{ parameters.podStartupLatencyThreshold }}
              anonymous_pull: ${{ parameters.anonymousPull }}
          max_parallel: 1
          credential_type: service_connection
          ssh_key_enabled: false
          timeout_in_minutes: 60
