trigger: none

# Runtime parameters — set these in the "Run pipeline" panel, no YAML edits per run.
parameters:
  - name: region
    displayName: Azure region
    type: string
    default: southeastasia
  - name: registryEndpoint
    displayName: "Registry login server (e.g. myreg.azurecr-test.io)"
    type: string
  - name: testImage
    displayName: "Image to pull (repo:tag)"
    type: string
    default: test-1gb-100l:v1
  - name: anonymousPull
    displayName: Anonymous pull
    type: boolean
    default: true
  - name: podStartupLatencyThreshold
    displayName: Pod startup latency threshold (large cold pulls need a high value)
    type: string
    default: 10m

# Microsoft-hosted pool (same as the working acr-telescope-image-pull-load
# pipeline 465527). If msazure 1ES policy blocks vmImage, remove this block and
# set the pool in the pipeline definition UI instead.
pool:
  vmImage: ubuntu-latest

variables:
  SCENARIO_TYPE: perf-eval
  # Reuses the committed 1000-node scenario infra (terraform + tfvars).
  SCENARIO_NAME: image-pull-n1000
  # Reuse the service connection the ACR image-pull-load pipeline uses; its SPN
  # can create AKS in the SEA-capable subscription dfb63c8c-7c89-4ef8-af13-75c1d873c895.
  AZURE_SERVICE_CONNECTION: 'ACR-Dev-william-telescope'
  AZURE_SUBSCRIPTION_ID: 'dfb63c8c-7c89-4ef8-af13-75c1d873c895'
  AZURE_SP_SUBSCRIPTION_ID: 'dfb63c8c-7c89-4ef8-af13-75c1d873c895'

stages:
  - stage: azure_${{ parameters.region }}_image_pull
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - ${{ parameters.region }}
          engine: clusterloader2
          engine_input:
            image: "ghcr.io/azure/clusterloader2:v20250513"
          topology: image-pull
          matrix:
            image-pull-1000nodes:
              desired_nodes: 1004
              node_count: 1000
              max_pods: 7
              repeats: 1              # one pull per node — the cold-start test
              operation_timeout: 60m
              load_type: memory
              memory_request_override: "1000Mi"
              scrape_containerd: True
              scrape_kubelets: False
              scrape_registry: False
              containerd_scrape_interval: 30s
              registry_endpoint: ${{ parameters.registryEndpoint }}
              test_image: ${{ parameters.testImage }}
              kubernetes_version: "1.34"
              pod_startup_latency_threshold: ${{ parameters.podStartupLatencyThreshold }}
              anonymous_pull: ${{ parameters.anonymousPull }}
          max_parallel: 1
          credential_type: service_connection
          ssh_key_enabled: false
          timeout_in_minutes: 100
